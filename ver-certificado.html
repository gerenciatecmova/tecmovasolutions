<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Ver certificado de capacitación técnica. Consulta los detalles de tu certificado de electricidad, PLC o automatización industrial en TECMOVA SOLUTIONS.">
    <meta name="keywords" content="ver certificado, certificado técnico, electricidad, PLC, automatización, TECMOVA SOLUTIONS, consulta de certificado">
    <meta name="robots" content="noindex, nofollow">
    <meta property="og:title" content="Ver Certificado - TECMOVA SOLUTIONS">
    <meta property="og:description" content="Consulta los detalles de tu certificado de capacitación técnica.">
    <meta property="og:type" content="website">
    <title>Ver Certificado | TECMOVA SOLUTIONS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --azul-electrico: #1E5EFF;
            --azul-oscuro: #0A2342;
            --gris-metalico: #7D8896;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }
        
        .certificate-container {
            max-width: 900px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        
        .certificate-card {
            background: white;
            border-radius: 1rem;
            padding: 2rem;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }
        
        .certificate-header {
            text-align: center;
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 2px solid #e5e7eb;
        }
        
        .certificate-title {
            font-size: 2rem;
            font-weight: bold;
            color: var(--azul-oscuro);
            margin-bottom: 0.5rem;
        }
        
        .certificate-subtitle {
            color: #6B7280;
            font-size: 1.1rem;
        }
        
        .student-info {
            background: #f8fafc;
            border-radius: 0.75rem;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }
        
        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.75rem;
        }
        
        .info-label {
            font-weight: 600;
            color: var(--azul-oscuro);
        }
        
        .info-value {
            color: #4B5563;
        }
        
        .certificate-image-container {
            text-align: center;
            margin-bottom: 2rem;
            background: #f8fafc;
            padding: 1.5rem;
            border-radius: 0.75rem;
        }
        
        .certificate-image {
            max-width: 100%;
            height: auto;
            border-radius: 0.5rem;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            transition: transform 0.3s;
        }
        
        .certificate-image:hover {
            transform: scale(1.02);
        }
        
        .btn-tecmova {
            display: block;
            width: 100%;
            background: linear-gradient(135deg, var(--azul-electrico) 0%, #0056CC 100%);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 0.75rem;
            font-weight: 700;
            font-size: 1.125rem;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 0.025em;
            margin-bottom: 1rem;
        }
        
        .btn-tecmova:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(30, 94, 255, 0.3);
        }
        
        .btn-secondary {
            display: block;
            width: 100%;
            background: transparent;
            color: var(--azul-oscuro);
            border: 2px solid var(--azul-oscuro);
            padding: 1rem;
            border-radius: 0.75rem;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            text-decoration: none;
        }
        
        .btn-secondary:hover {
            background: var(--azul-oscuro);
            color: white;
        }
        
        .not-found {
            text-align: center;
            padding: 3rem;
        }
        
        .not-found-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }
        
        .footer {
            background: var(--azul-oscuro);
            color: white;
            text-align: center;
            padding: 1.5rem 0;
            margin-top: 3rem;
        }
        
        @media (max-width: 768px) {
            .certificate-container {
                margin: 1rem auto;
            }
            
            .certificate-card {
                padding: 1.5rem;
            }
            
            .certificate-title {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="bg-[var(--azul-oscuro)] text-white">
      <div class="container mx-auto flex justify-between items-center py-4 px-4">
        <h1 class="flex items-center gap-2 text-xl md:text-2xl font-bold">
          <img src="imagenes/logo_empresa_index.png" alt="TECMOVA" class="h-10 md:h-12">
          TECMOVA SOLUTIONS
        </h1>
      </div>
    </header>

    <!-- Contenido Principal -->
    <main class="certificate-container">
        <div id="certificateContent">
            <!-- El contenido se cargará dinámicamente -->
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <p>&copy; 2025 TECMOVA SOLUTIONS – Todos los derechos reservados.</p>
    </footer>

    <script defer>
        // ============================================
        // CONFIGURACIÓN OPTIMIZADA
        // ============================================
        const CERTIFICADOS_JSON_URL = './certificados.json';
        
        let certificadosDB = {
            // Datos de respaldo (se usan si el JSON no carga)
            "12345678": {
                "nombre": "Juan Pérez García",
                "certificados": [
                    {
                        "curso": "Automatización PLC",
                        "fechaCurso": "Enero-Marzo 2025",
                        "duracion": "120 horas",
                        "imagen": "./certificados/12345678_certificado.jpg",
                        "fechaEmision": "15/03/2025",
                        "nota": "Aprobado"
                    }
                ]
            },
            "87654321": {
                "nombre": "María Gómez López",
                "certificados": [
                    {
                        "curso": "Electricidad Industrial",
                        "fechaCurso": "Feb-Marzo 2025",
                        "duracion": "80 horas",
                        "imagen": "./certificados/87654321_certificado.jpg",
                        "fechaEmision": "10/03/2025",
                        "nota": "Aprobado"
                    }
                ]
            },
            "75591905": {
                "nombre": "Kenin Risalbe Melgar",
                "certificados": [
                    {
                        "curso": "Automatización con PLC Siemens",
                        "fechaCurso": "21/02/2026",
                        "duracion": "120 horas",
                        "fechaEmision": "21/03/2026",
                        "imagen": "./certificados/75591905_certificado.jpg",
                        "nota": "17"
                    }
                ]
            },
            "48592613": {
                "nombre": "Jose Huanca Alvino",
                "certificados": [
                    {
                        "curso": "Automatización con PLC Siemens",
                        "fechaCurso": "22/02/2026",
                        "duracion": "120 horas",
                        "fechaEmision": "22/03/2026",
                        "imagen": "./certificados/48592613_certificado.jpg",
                        "nota": "17"
                    }
                ]
            },
            "48002574": {
                "nombre": "Henry pariansullca Otcane",
                "certificados": [
                    {
                        "curso": "Automatización con PLC Siemens",
                        "fechaCurso": "23/02/2026",
                        "duracion": "120 horas",
                        "fechaEmision": "23/03/2026",
                        "imagen": "./certificados/48002574_certificado.jpg",
                        "nota": "17"
                    }
                ]
            },
            "11111111": {
                "nombre": "Carlos Rodríguez Martínez",
                "certificados": [
                    {
                        "curso": "Electricidad Industrial",
                        "fechaCurso": "Enero-Febrero 2025",
                        "duracion": "80 horas",
                        "imagen": "./certificados/11111111_electricidad.jpg",
                        "fechaEmision": "28/02/2025",
                        "nota": "18"
                    },
                    {
                        "curso": "Automatización con PLC Siemens",
                        "fechaCurso": "Marzo-Abril 2025",
                        "duracion": "120 horas",
                        "imagen": "./certificados/11111111_plc.jpg",
                        "fechaEmision": "30/04/2025",
                        "nota": "17"
                    },
                    {
                        "curso": "Diseño y Armado de Tableros Eléctricos",
                        "fechaCurso": "Mayo-Junio 2025",
                        "duracion": "100 horas",
                        "imagen": "./certificados/11111111_tableros.jpg",
                        "fechaEmision": "30/06/2025",
                        "nota": "19"
                    }
                ]
            }
        };
        
        // Cargar base de datos desde JSON (intenta actualizar si puede)
        async function cargarBaseDeDatos() {
            try {
                const response = await fetch(CERTIFICADOS_JSON_URL);
                if (!response.ok) throw new Error('No se pudo cargar');
                const data = await response.json();
                // Si carga correctamente, actualiza la base de datos
                certificadosDB = { ...certificadosDB, ...data };
                console.log('Base de datos actualizada desde JSON');
            } catch (error) {
                console.log('Usando datos locales (modo offline)');
                // Los datos de respaldo ya están en certificadosDB
            }
        }
        
        // Obtener parámetros de la URL
        function getQueryParam(param) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(param);
        }
        
        // Buscar certificado
        function buscarCertificado(dni) {
            return certificadosDB[dni] || null;
        }
        
        // Cargar certificado
        async function cargarCertificado() {
            // Primero cargar la base de datos
            await cargarBaseDeDatos();
            
            const dni = getQueryParam('dni');
            const content = document.getElementById('certificateContent');
            
            // Mostrar loader
            content.innerHTML = `
                <div class="certificate-card" style="text-align: center; padding: 3rem;">
                    <p style="color: #6B7280; font-size: 1.2rem;">🔍 Buscando certificado...</p>
                </div>
            `;
            
            if (!dni) {
                mostrarNoEncontrado(content, 'No se proporcionó DNI');
                return;
            }
            
            // Buscar certificado
            const certificado = buscarCertificado(dni);
            
            if (certificado) {
                mostrarCertificado(content, certificado, dni);
            } else {
                mostrarNoEncontrado(content, dni);
            }
        }
        
        // Mostrar certificados encontrados
        function mostrarCertificado(content, alumno, dni) {
            const certificados = alumno.certificados;
            const cantidadCertificados = certificados.length;
            
            let html = `
                <div class="certificate-card">
                    <div class="certificate-header">
                        <h1 class="certificate-title">🎓 Certificados de Competencia</h1>
                        <p class="certificate-subtitle">TECMOVA SOLUTIONS</p>
                        <div class="student-summary">
                            <div class="info-row">
                                <span class="info-label">👤 Alumno:</span>
                                <span class="info-value">${alumno.nombre}</span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">🆔 DNI:</span>
                                <span class="info-value">${dni}</span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">� Total de Certificados:</span>
                                <span class="info-value" style="color: var(--azul-electrico); font-weight: bold;">${cantidadCertificados} certificado(s)</span>
                            </div>
                        </div>
                    </div>
                    
                    <div class="certificates-list">
                        ${certificados.map((certificado, index) => `
                            <div class="certificate-item" style="border: 2px solid #e5e7eb; border-radius: 1rem; padding: 1.5rem; margin-bottom: 1.5rem; background: #f9fafb;">
                                <div class="certificate-number" style="text-align: center; margin-bottom: 1rem;">
                                    <span style="background: var(--azul-electrico); color: white; padding: 0.5rem 1rem; border-radius: 2rem; font-weight: bold; font-size: 0.9rem;">
                                        Certificado ${index + 1} de ${cantidadCertificados}
                                    </span>
                                </div>
                                
                                <div class="certificate-details">
                                    <div class="info-row">
                                        <span class="info-label">📚 Curso:</span>
                                        <span class="info-value">${certificado.curso}</span>
                                    </div>
                                    <div class="info-row">
                                        <span class="info-label">📅 Período del Curso:</span>
                                        <span class="info-value">${certificado.fechaCurso || 'No especificado'}</span>
                                    </div>
                                    <div class="info-row">
                                        <span class="info-label">⏱️ Duración:</span>
                                        <span class="info-value">${certificado.duracion || 'No especificada'}</span>
                                    </div>
                                    <div class="info-row">
                                        <span class="info-label">📆 Fecha de Emisión:</span>
                                        <span class="info-value">${certificado.fechaEmision || new Date().toLocaleDateString('es-ES', { year: 'numeric', month: 'long', day: 'numeric' })}</span>
                                    </div>
                                    <div class="info-row">
                                        <span class="info-label">📝 Calificación:</span>
                                        <span class="info-value" style="color: var(--azul-electrico); font-weight: bold;">${certificado.nota || 'Aprobado'}</span>
                                    </div>
                                </div>
                                
                                <div class="certificate-image-container" style="text-align: center; margin-top: 1.5rem;">
                                    <p style="color: #6B7280; margin-bottom: 1rem; font-size: 0.9rem;">Vista previa del certificado:</p>
                                    <img src="${certificado.imagen}" 
                                         alt="Certificado de ${alumno.nombre} - ${certificado.curso}" 
                                         class="certificate-image"
                                         style="max-width: 100%; height: auto; border-radius: 0.5rem; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);"
                                         loading="lazy"
                                         decoding="async"
                                         onerror="this.src='./certificados/placeholder.jpg'; this.alt='Imagen no disponible'">
                                </div>
                            </div>
                        `).join('')}
                    </div>
                    
                    <div style="text-align: center; margin-top: 2rem;">
                        <a href="certificados.html" class="btn-secondary" style="display: inline-block;">
                            ← Volver a Certificados
                        </a>
                    </div>
                </div>
            `;
            
            content.innerHTML = html;
        }
        
        // Mostrar mensaje de no encontrado
        function mostrarNoEncontrado(content, dni) {
            content.innerHTML = `
                <div class="certificate-card not-found">
                    <div class="not-found-icon">❌</div>
                    <h2 class="certificate-title">Certificado No Encontrado</h2>
                    <p style="color: #6B7280; margin-bottom: 1.5rem;">
                        ${dni === 'No se proporcionó DNI' 
                            ? 'No se proporcionó un DNI válido.' 
                            : `El DNI <strong>${dni}</strong> no tiene certificados registrados.`}
                    </p>
                    <p style="color: #9CA3AF; font-size: 0.9rem; margin-bottom: 1.5rem;">
                        Verifica que el DNI esté correcto o contacta a soporte técnico.
                    </p>
                    <a href="certificados.html" class="btn-tecmova" style="max-width: 300px; margin: 0 auto;">
                        🔍 Buscar Certificado
                    </a>
                </div>
            `;
        }
        
        // Cargar al iniciar
        document.addEventListener('DOMContentLoaded', cargarCertificado);
    </script>
</body>
</html>
